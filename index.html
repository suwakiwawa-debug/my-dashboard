<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智能家居儀表板 - 天氣與新聞版</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background-color: #000000; }
    @keyframes ticker {
      0% { transform: translate3d(0, 0, 0); }
      100% { transform: translate3d(-100%, 0, 0); }
    }
    .ticker-track {
      display: inline-block;
      white-space: nowrap;
      padding-left: 100%;
      animation: ticker 40s linear infinite;
    }
    .pixel-font {
      font-family: 'Courier New', Courier, monospace;
      font-weight: bold;
    }
    /* 隱藏滾動條但保留滾動功能 */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="text-white min-h-screen flex flex-col justify-between overflow-hidden select-none">

  <div class="p-4 md:p-6 flex-1 grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6 pb-20">
    
    <div class="bg-blue-900 bg-opacity-25 border-2 border-blue-500 rounded-xl p-6 flex flex-col justify-between shadow-lg">
      <div>
        <div class="text-blue-400 text-xs font-bold tracking-wider mb-2">HKO REAL-TIME SYSTEM</div>
        <div id="current-time" class="text-5xl md:text-6xl font-black text-cyan-300 pixel-font">--:-- --</div>
        <div id="current-date" class="text-sm text-gray-400 mt-1">----/--/-- ---</div>
      </div>

      <div class="mt-8 space-y-4">
        <div class="flex items-center justify-between">
          <span class="text-gray-300 text-lg">溫度 Temp:</span>
          <span id="weather-temp" class="text-4xl font-bold text-white pixel-font">-- °C</span>
        </div>
        <div class="flex items-center justify-between">
          <span class="text-gray-300 text-lg">濕度 Humidity:</span>
          <span id="weather-humidity" class="text-3xl font-bold text-cyan-400 pixel-font">-- %</span>
        </div>
        <div class="flex items-center justify-between">
          <span class="text-gray-300 text-lg">紫外線 UV Index:</span>
          <span id="weather-uv" class="text-2xl font-bold text-yellow-400 pixel-font">--</span>
        </div>
        <div class="flex items-center justify-between border-t border-blue-500 border-opacity-30 pt-3">
          <span class="text-gray-300 text-lg">定點降雨 Rain:</span>
          <span id="weather-rain" class="text-2xl font-bold text-emerald-400 pixel-font">--</span>
        </div>
      </div>
    </div>

    <div class="bg-gray-900 border-2 border-gray-700 rounded-xl p-6 flex flex-col shadow-lg overflow-hidden">
      <div class="flex justify-between items-center mb-4">
        <div class="text-orange-400 text-xs font-bold tracking-wider">NOW NEWS HIGHLIGHTS</div>
        <div class="text-xs bg-orange-600 text-white px-2 py-0.5 rounded animate-pulse">LIVE</div>
      </div>
      
      <div id="now-news-list" class="flex-1 flex flex-col space-y-4 overflow-y-auto no-scrollbar">
        <div class="flex items-center justify-center h-full">
          <span class="text-gray-500 pixel-font">正在載入新聞...</span>
        </div>
      </div>
    </div>

  </div>

  <div class="bg-gray-950 border-t-2 border-orange-500 fixed bottom-0 left-0 w-full py-3 z-50">
    <div class="relative w-full flex items-center overflow-hidden">
      <span class="absolute left-0 bg-orange-500 text-black font-black px-3 py-1 text-sm z-10 shadow-md">焦點資訊</span>
      <div class="ticker-track text-base text-gray-100 font-medium" id="news-ticker">
        • 智能家居儀表板天氣系統運作正常 • 正在為您更新 Now 新聞港聞摘要...
      </div>
    </div>
  </div>

  <script>
    function updateClock() {
      try {
        const now = new Date();
        const optionsDate = { year: 'numeric', month: '2-digit', day: '2-digit', weekday: 'short' };
        let hours = now.getHours();
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const ampm = hours >= 12 ? 'PM' : 'AM';
        hours = hours % 12 || 12; 
        document.getElementById('current-time').innerText = `${hours}:${minutes} ${ampm}`;
        document.getElementById('current-date').innerText = now.toLocaleDateString('zh-HK', optionsDate).toUpperCase();
      } catch(e) {}
    }
    setInterval(updateClock, 1000); updateClock();
  </script>

  <script>
    async function fetchWeather() {
      try {
        const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=22.3132&longitude=114.2258&current=temperature_2m,relative_humidity_2m,precipitation,is_day&daily=uv_index_max&timezone=Asia%2FHong_Kong');
        const data = await res.json();
        if(data && data.current) {
          document.getElementById('weather-temp').innerText = `${Math.round(data.current.temperature_2m)} °C`;
          document.getElementById('weather-humidity').innerText = `${data.current.relative_humidity_2m} %`;
          const currentRain = data.current.precipitation || 0;
          const rainLabel = document.getElementById('weather-rain');
          if (currentRain > 0) {
            rainLabel.innerText = `有雨 ${currentRain}mm`;
            rainLabel.className = "text-2xl font-bold text-red-400 pixel-font";
          } else {
            rainLabel.innerText = "無雨 0mm";
            rainLabel.className = "text-2xl font-bold text-emerald-400 pixel-font";
          }
          if(data.daily && data.daily.uv_index_max) {
            const uv = Math.round(data.daily.uv_index_max[0]);
            let uvStr = `${uv}`;
            if(uv <= 2) uvStr += ' (低)';
            else if(uv <= 5) uvStr += ' (中)';
            else uvStr += ' (高)';
            document.getElementById('weather-uv').innerText = uvStr;
          }
        }
      } catch (error) { 
        document.getElementById('weather-temp').innerText = "獲取失敗";
      }
    }
    setInterval(fetchWeather, 60000); fetchWeather();
  </script>

  <script>
    async function fetchNowNews() {
      try {
        // 使用免費 API 將 Now 新聞 (港聞) 的 RSS 轉為可讀數據
        const rssUrl = encodeURIComponent('https://news.now.com/rss/local');
        const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${rssUrl}`);
        const data = await res.json();
        
        if (data.status === 'ok' && data.items.length > 0) {
          // 只抽取最新 3 條新聞，以免超出畫面
          const topNews = data.items.slice(0, 3);
          
          let newsHtml = '';
          topNews.forEach(item => {
            // 格式化時間 (去除秒數)
            const pubTime = new Date(item.pubDate.replace(/-/g, '/'));
            const timeString = `${String(pubTime.getHours()).padStart(2, '0')}:${String(pubTime.getMinutes()).padStart(2, '0')}`;
            
            newsHtml += `
              <div class="border-b border-gray-800 pb-3 last:border-0">
                <div class="text-white text-base md:text-lg font-medium leading-snug mb-1">${item.title}</div>
                <div class="text-gray-500 text-xs flex items-center">
                  <span class="inline-block w-2 h-2 bg-orange-500 rounded-full mr-2"></span>
                  更新時間: ${timeString}
                </div>
              </div>
            `;
          });
          
          document.getElementById('now-news-list').innerHTML = newsHtml;
          
          // 順便更新埋最底嘅走馬燈
          const allNewsTitles = data.items.slice(0, 8).map(item => `• ${item.title} `).join('     ');
          document.getElementById('news-ticker').innerHTML = `<span>${allNewsTitles}</span><span>${allNewsTitles}</span>`;
        }
      } catch (e) {
        document.getElementById('now-news-list').innerHTML = '<div class="text-red-400 pixel-font mt-4">無法載入新聞，請檢查網絡連線。</div>';
      }
    }
    
    // 每 5 分鐘自動刷新一次新聞
    setInterval(fetchNowNews, 300000); 
    fetchNowNews();
  </script>
</body>
</html>
