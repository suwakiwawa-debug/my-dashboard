<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智能家居儀表板 - 終極保險版</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap');
    body { background-color: #282421; font-family: 'Zen Maru Gothic', sans-serif; color: #EAE6DF; }
    
    /* 走馬燈減慢至 90 秒 */
    @keyframes ticker { 0% { transform: translate3d(0, 0, 0); } 100% { transform: translate3d(-100%, 0, 0); } }
    .ticker-track { display: inline-block; white-space: nowrap; padding-left: 100%; animation: ticker 90s linear infinite; }
    
    /* 太陽慢速自轉 */
    @keyframes wabi-sabi-spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .animate-sun-slow { animation: wabi-sabi-spin 30s linear infinite; }

    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .pixel-font { font-family: 'Courier New', Courier, monospace; font-weight: bold; }
  </style>
</head>
<body class="min-h-screen flex flex-col justify-between overflow-hidden select-none">
  <div class="p-5 md:p-8 flex-1 grid grid-cols-1 md:grid-cols-2 gap-6 md:gap-8 pb-20">
    
    <div class="bg-[#36302B] rounded-3xl p-8 flex flex-col justify-between shadow-2xl border border-[#4A433D] relative overflow-hidden">
      <div class="flex justify-between items-start z-10 relative">
        <div>
          <div id="current-time" class="text-5xl font-bold text-[#F9F8F6] tracking-tight">--:-- --</div>
          <div id="current-date" class="text-sm text-[#B3A99F] mt-1 font-medium">----/--/-- ---</div>
        </div>
      </div>

      <div class="flex flex-col items-center justify-center my-8 z-10 relative">
        <div class="animate-sun-slow origin-center">
          <svg class="w-28 h-28 text-[#D4A373] drop-shadow-lg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
          </svg>
        </div>
        <span id="weather-temp" class="text-7xl font-bold text-[#F9F8F6] mt-4 tracking-tighter">載入中</span>
        <span class="text-xs text-[#B3A99F] mt-2 tracking-widest">觀塘區即時氣象</span>
      </div>

      <div class="flex justify-between items-center bg-[#2C2824] p-4 rounded-2xl z-10 relative border border-[#4A433D]">
        <div class="text-center flex-1">
          <div class="text-[#B3A99F] text-xs mb-1">濕度</div>
          <div id="weather-humidity" class="text-xl font-bold text-[#8BA88E]">-- %</div>
        </div>
        <div class="w-px h-8 bg-[#4A433D]"></div>
        <div class="text-center flex-1">
          <div class="text-[#B3A99F] text-xs mb-1">紫外線</div>
          <div id="weather-uv" class="text-xl font-bold text-[#D4A373]">--</div>
        </div>
        <div class="w-px h-8 bg-[#4A433D]"></div>
        <div class="text-center flex-1">
          <div class="text-[#B3A99F] text-xs mb-1">定點降雨</div>
          <div id="weather-rain" class="text-xl font-bold text-[#8BA88E]">0 mm</div>
        </div>
      </div>
    </div>

    <div class="bg-[#36302B] rounded-3xl p-8 flex flex-col shadow-2xl border border-[#4A433D] overflow-hidden">
      <div class="flex justify-between items-center mb-6">
        <div class="text-[#B3A99F] text-sm font-bold tracking-widest">RTHK NEWS</div>
        <div class="text-xs bg-[#D4A373] text-[#282421] px-3 py-1 rounded-full font-bold animate-pulse">即時</div>
      </div>
      <div id="news-list" class="flex-1 flex flex-col space-y-5 overflow-y-auto no-scrollbar">
        <div class="flex items-center justify-center h-full"><span class="text-[#B3A99F]">正在讀取最新新聞...</span></div>
      </div>
    </div>
  </div>

  <div class="bg-[#2C2824] border-t border-[#4A433D] fixed bottom-0 left-0 w-full py-4 z-50">
    <div class="relative w-full flex items-center overflow-hidden">
      <span class="absolute left-0 bg-[#2C2824] text-[#B3A99F] font-bold px-5 py-1 text-sm z-10 shadow-[4px_0_10px_rgba(44,40,36,1)]">最新消息</span>
      <div class="ticker-track text-base text-[#EAE6DF] font-medium" id="news-ticker">• 系統正在同步最新數據...</div>
    </div>
  </div>

  <script>
    // 時鐘
    function updateClock() {
      try {
        const now = new Date();
        const optionsDate = { year: 'numeric', month: '2-digit', day: '2-digit', weekday: 'short' };
        let hours = now.getHours(), minutes = String(now.getMinutes()).padStart(2, '0'), ampm = hours >= 12 ? 'PM' : 'AM';
        hours = hours % 12 || 12; 
        document.getElementById('current-time').innerText = `${hours}:${minutes} ${ampm}`;
        document.getElementById('current-date').innerText = now.toLocaleDateString('zh-HK', optionsDate).toUpperCase();
      } catch(e) {}
    }
    setInterval(updateClock, 1000); updateClock();

    // 天氣三重保險機制
    async function fetchWeather() {
      const ts = new Date().getTime();
      let isSuccess = false;
      let weatherData = null;

      // 保險 1：直連天文台
      try {
        const r1 = await fetch(`https://data.weather.gov.hk/weatherAPI/opendata/weather.do?dataType=rhrread&lang=tc&_=${ts}`);
        if(r1.ok) { weatherData = await r1.json(); isSuccess = true; }
      } catch(e) {}

      // 保險 2：如果被攔截，用 Proxy 強制讀取天文台
      if(!isSuccess) {
        try {
          const r2 = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent('https://data.weather.gov.hk/weatherAPI/opendata/weather.do?dataType=rhrread&lang=tc&_=' + ts)}`);
          if(r2.ok) { weatherData = await r2.json(); isSuccess = true; }
        } catch(e) {}
      }

      // 天文台數據解析
      if(isSuccess && weatherData && weatherData.temperature) {
        const kt = weatherData.temperature.data.find(t => t.place === '觀塘');
        const temp = kt ? kt.value : weatherData.temperature.data[0].value;
        document.getElementById('weather-temp').innerText = `${temp} °C`;
        
        if(weatherData.humidity && weatherData.humidity.data.length > 0) {
          document.getElementById('weather-humidity').innerText = `${weatherData.humidity.data[0].value} %`;
        }
        
        let uv = 0;
        if(weatherData.uvindex && weatherData.uvindex.data && weatherData.uvindex.data.length > 0) uv = weatherData.uvindex.data[0].value;
        document.getElementById('weather-uv').innerText = uv > 0 ? `${uv} (高)` : '0 (低)';
        document.getElementById('weather-uv').className = uv > 0 ? "text-xl font-bold text-[#D4A373]" : "text-xl font-bold text-[#8BA88E]";
        return;
      }

      // 保險 3：終極兜底，使用 Open-Meteo (加入夜晚 UV 強制歸零)
      try {
        const r3 = await fetch('https://api.open-meteo.com/v1/forecast?latitude=22.3132&longitude=114.2258&current=temperature_2m,relative_humidity_2m&daily=uv_index_max&timezone=Asia%2FHong_Kong');
        const d3 = await r3.json();
        document.getElementById('weather-temp').innerText = `${Math.round(d3.current.temperature_2m)} °C`;
        document.getElementById('weather-humidity').innerText = `${d3.current.relative_humidity_2m} %`;
        
        const currentHour = new Date().getHours();
        let uv3 = Math.round(d3.daily.uv_index_max[0]);
        if(currentHour >= 18 || currentHour <= 6) uv3 = 0; // 夜晚強制歸零
        
        document.getElementById('weather-uv').innerText = uv3 > 0 ? `${uv3} (高)` : '0 (低)';
        document.getElementById('weather-uv').className = uv3 > 0 ? "text-xl font-bold text-[#D4A373]" : "text-xl font-bold text-[#8BA88E]";
      } catch(e) {
        document.getElementById('weather-temp').innerText = "-- °C";
      }
    }
    setInterval(fetchWeather, 60000); fetchWeather();

    // 實時新聞雙重保險
    async function fetchHKNews() {
      let itemsData = [];
      const ts = Math.floor(Date.now() / 300000); // 5分鐘緩存破解
      
      // 保險 1：rss2json 帶破解參數
      try {
        const r1 = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent('https://rthk.hk/rthk/news/rss/c_expressnews_clocal.xml?v=' + ts)}`);
        const d1 = await r1.json();
        if(d1.status === 'ok' && d1.items.length > 0) itemsData = d1.items;
      } catch(e) {}

      // 保險 2：Proxy 原生 XML 讀取
      if(itemsData.length === 0) {
        try {
          const r2 = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent('https://rthk.hk/rthk/news/rss/c_expressnews_clocal.xml?_=' + Date.now())}`);
          const xml = await r2.text();
          const doc = new DOMParser().parseFromString(xml, "text/xml");
          const nodes = doc.querySelectorAll("item");
          Array.from(nodes).slice(0, 8).forEach(node => {
            itemsData.push({
              title: node.querySelector("title").textContent,
              pubDate: node.querySelector("pubDate").textContent
            });
          });
        } catch(e) {}
      }

      if(itemsData.length > 0) {
        let html = '', ticker = '';
        for(let i=0; i<Math.min(3, itemsData.length); i++) {
          const dateStr = itemsData[i].pubDate.replace(/-/g, '/'); // 修正 Safari Date Bug
          const d = new Date(dateStr);
          let h = d.getHours(), m = String(d.getMinutes()).padStart(2, '0');
          const timeStr = isNaN(h) ? "即時" : `${String(h).padStart(2, '0')}:${m}`;
          
          html += `<div class="border-b border-[#4A433D] pb-4 last:border-0"><div class="text-[#F9F8F6] text-base md:text-lg font-bold leading-relaxed mb-2">${itemsData[i].title}</div><div class="text-[#A3998F] text-xs flex items-center font-medium"><span class="inline-block w-1.5 h-1.5 bg-[#D4A373] rounded-full mr-2"></span>更新時間: ${timeStr}</div></div>`;
        }
        document.getElementById('news-list').innerHTML = html;
        
        for(let i=0; i<Math.min(8, itemsData.length); i++) { ticker += `• ${itemsData[i].title} 　　`; }
        document.getElementById('news-ticker').innerHTML = `<span>${ticker}</span><span>${ticker}</span>`;
      } else {
        document.getElementById('news-list').innerHTML = '<div class="text-[#D4A373] mt-4">正在重新連線至新聞中心...</div>';
      }
    }
    setInterval(fetchHKNews, 60000); fetchHKNews();
  </script>
</body>
</html>
