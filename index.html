<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智能家居儀表板 - 終極穩定版</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <style>
    body { background-color: #000000; }
    @keyframes ticker {
      0% { transform: translate3d(0, 0, 0); }
      100% { transform: translate3d(-50%, 0, 0); }
    }
    .ticker-track {
      display: inline-block;
      white-space: nowrap;
      animation: ticker 45s linear infinite;
    }
    .pixel-font {
      font-family: 'Courier New', Courier, monospace;
      font-weight: bold;
    }
  </style>
</head>
<body class="text-white min-h-screen flex flex-col justify-between overflow-hidden select-none">

  <div class="p-6 flex-1 grid grid-cols-1 md:grid-cols-2 gap-6 pb-20">
    
    <div class="bg-blue-900 bg-opacity-25 border-2 border-blue-500 rounded-xl p-6 flex flex-col justify-between shadow-lg">
      <div>
        <div class="text-blue-400 text-xs font-bold tracking-wider mb-2">HKO REAL-TIME SYSTEM</div>
        <div id="current-time" class="text-5xl md:text-6xl font-black text-cyan-300 pixel-font">--:-- --</div>
        <div id="current-date" class="text-sm text-gray-400 mt-1">----/--/-- ---</div>
      </div>

      <div class="mt-4 space-y-3">
        <div class="flex items-center justify-between">
          <span class="text-gray-300 text-lg">溫度 Temp:</span>
          <span id="weather-temp" class="text-4xl font-bold text-white pixel-font">-- °C</span>
        </div>
        <div class="flex items-center justify-between">
          <span class="text-gray-300 text-lg">濕度 Humidity:</span>
          <span id="weather-humidity" class="text-3xl font-bold text-cyan-400 pixel-font">-- %</span>
        </div>
        <div class="flex items-center justify-between">
          <span class="text-gray-300 text-lg">紫外線 UV Index:</span>
          <span id="weather-uv" class="text-2xl font-bold text-yellow-400 pixel-font">--</span>
        </div>
        <div class="flex items-center justify-between border-t border-blue-500 border-opacity-20 pt-2">
          <span class="text-gray-300 text-lg">定點降雨 Rain:</span>
          <span id="weather-rain" class="text-2xl font-bold text-emerald-400 pixel-font">--</span>
        </div>
        <div class="border-t border-blue-500 border-opacity-30 pt-2 text-xs text-blue-300" id="weather-warning">
          警告: 正常天氣 Alert: Normal Weather
        </div>
      </div>
    </div>

    <div class="bg-gray-900 border-2 border-gray-700 rounded-xl p-6 flex flex-col shadow-lg">
      <div class="text-orange-400 text-xs font-bold tracking-wider mb-4">HK BUS STATION HUB</div>
      
      <div class="flex-1 flex flex-col justify-around space-y-4">
        <div class="flex items-center justify-between border-b border-gray-800 pb-3">
          <div>
            <span class="bg-red-600 text-white font-bold px-2 py-1 rounded text-lg pixel-font">619</span>
            <span class="text-xs text-gray-400 block mt-1">往 中環 (港澳碼頭)</span>
          </div>
          <div class="text-right">
            <span class="text-2xl font-bold text-green-400 pixel-font" id="bus-1-eta">更新中...</span>
          </div>
        </div>

        <div class="flex items-center justify-between border-b border-gray-800 pb-3">
          <div>
            <span class="bg-red-600 text-white font-bold px-2 py-1 rounded text-lg pixel-font">40A</span>
            <span class="text-xs text-gray-400 block mt-1">往 葵興站</span>
          </div>
          <div class="text-right">
            <span class="text-2xl font-bold text-green-400 pixel-font" id="bus-2-eta">更新中...</span>
          </div>
        </div>
      </div>
    </div>

  </div>

  <div class="bg-gray-950 border-t-2 border-yellow-400 fixed bottom-0 left-0 w-full py-3 overflow-hidden z-50">
    <div class="relative w-full flex items-center">
      <span class="absolute left-0 bg-yellow-400 text-black font-black px-3 py-1 text-sm z-10 shadow-md">最新消息</span>
      <div class="ticker-track pl-[90px] text-base text-gray-100 font-medium" id="news-ticker">
        • 智能家居儀表板已成功部署上線 • 實時香港天氣報告及九巴 ETA 數據正在同步獲取中...
      </div>
    </div>
  </div>

  <script>
    // 1. 實時時間功能 (用 try-catch 包裹，確保絕對不會掛掉)
    function updateClock() {
      try {
        const now = new Date();
        const optionsDate = { year: 'numeric', month: '2-digit', day: '2-digit', weekday: 'short' };
        let hours = now.getHours();
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const ampm = hours >= 12 ? 'PM' : 'AM';
        hours = hours % 12; hours = hours ? hours : 12; 
        document.getElementById('current-time').innerText = `${hours}:${minutes} ${ampm}`;
        document.getElementById('current-date').innerText = now.toLocaleDateString('zh-HK', optionsDate).toUpperCase();
      } catch(e) { console.error(e); }
    }
    setInterval(updateClock, 1000); 
    updateClock();

    // 2. 獲取香港天文台真實數據
    async function fetchWeather() {
      try {
        const res = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.do?dataType=rhrread&lang=tc');
        const data = await res.json();
        
        if(data.temperature && data.temperature.data.length > 0) {
          document.getElementById('weather-temp').innerText = `${data.temperature.data[0].value} °C`;
        }
        if(data.humidity && data.humidity.data.length > 0) {
          document.getElementById('weather-humidity').innerText = `${data.humidity.data[0].value} %`;
        }
        if(data.uvindex && data.uvindex.data.length > 0) {
          document.getElementById('weather-uv').innerText = `${data.uvindex.data[0].value}`;
        } else {
          document.getElementById('weather-uv').innerText = '0 (低)';
        }
        if(data.warningMessage && data.warningMessage.length > 0) {
          document.getElementById('weather-warning').innerText = '警告: ' + data.warningMessage.join(' | ');
        } else {
          document.getElementById('weather-warning').innerText = '警告: 正常天氣 Alert: Normal Weather';
        }
      } catch (error) { 
        console.error("天氣更新失敗:", error); 
      }

      // 獨立獲取降雨量
      try {
        const rainRes = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/isohyets.do');
        const rainData = await rainRes.json();
        if (rainData && rainData.data && rainData.data.length > 0) {
          const latestRain = rainData.data[0].max1h || 0;
          const rainLabel = document.getElementById('weather-rain');
          if (latestRain > 0) {
            rainLabel.innerText = `有雨 ${latestRain}mm`;
            rainLabel.className = "text-2xl font-bold text-red-400 pixel-font";
          } else {
            rainLabel.innerText = "無雨 0mm";
            rainLabel.className = "text-2xl font-bold text-emerald-400 pixel-font";
          }
        }
      } catch (e) {
        document.getElementById('weather-rain').innerText = "無雨 0mm";
      }
    }
    setInterval(fetchWeather, 60000); 
    fetchWeather();

    // 3. 獲取政府新聞網 RSS 實時摘要
    async function fetchNews() {
      try {
        const rssUrl = encodeURIComponent('https://www.news.gov.hk/tc/common/html/ticker.rss');
        const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${rssUrl}`);
        const data = await res.json();
        
        if (data.status === 'ok' && data.items.length > 0) {
          const newsList = data.items.map(item => `• ${item.title} `).join('     ');
          const tickerElement = document.getElementById('news-ticker');
          tickerElement.innerHTML = `<span>${newsList}</span><span>${newsList}</span>`;
        } else { throw new Error(); }
      } catch (error) { 
        const backupNews = "• 歡迎使用智能家居儀表板 • 實時港澳突發新聞摘要系統運作正常 • 巴士到站時間與香港天文台數據已同步上線";
        document.getElementById('news-ticker').innerHTML = `<span>${backupNews}</span><span>${backupNews}</span>`;
      }
    }
    setInterval(fetchNews, 600000); 
    fetchNews();

    // 4. 實時九巴到站時間 (ETA)
    const MY_BUS_619_STOP_ID = "94FE5329C4EE66A3"; 
    const MY_BUS_40A_STOP_ID = "3D4C0A620DBF0D3C"; 

    async function fetchBusETA() {
      // 619 ETA
      try {
        const res = await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/eta/${MY_BUS_619_STOP_ID}/619/1`);
        const data = await res.json();
        if(data.data && data.data.length > 0 && data.data[0].eta) {
          const diffMins = Math.max(0, Math.round((new Date(data.data[0].eta) - new Date()) / 1000 / 60));
          document.getElementById('bus-1-eta').innerText = `${diffMins} 分鐘`;
        } else { document.getElementById('bus-1-eta').innerText = "無班次"; }
      } catch (e) { document.getElementById('bus-1-eta').innerText = "連線中..."; }

      // 40A ETA
      try {
        const res = await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/eta/${MY_BUS_40A_STOP_ID}/40A/1`);
        const data = await res.json();
        if(data.data && data.data.length > 0 && data.data[0].eta) {
          const diffMins = Math.max(0, Math.round((new Date(data.data[0].eta) - new Date()) / 1000 / 60));
          document.getElementById('bus-2-eta').innerText = `${diffMins} 分鐘`;
        } else { document.getElementById('bus-2-eta').innerText = "無班次/已過"; }
      } catch (e) { document.getElementById('bus-2-eta').innerText = "連線中..."; }
    }
    setInterval(fetchBusETA, 30000); 
    fetchBusETA();
  </script>
</body>
</html>
