<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智能家居儀表板 - Apple Weather 風格</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* 使用近似蘋果的系統字體 */
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      /* 蘋果天氣經典深色漸變背景 */
      background: linear-gradient(180deg, #1c2834 0%, #0e1620 100%);
      color: white;
    }
    /* 隱藏滾動條 */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    /* 玻璃透視效果卡片 */
    .glass-card {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    /* 超幼細字體 */
    .font-ultralight { font-weight: 200; }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center py-10 px-4 select-none overflow-x-hidden">

  <div class="w-full max-w-md flex flex-col items-center mt-4">
    <div class="text-3xl font-normal tracking-wide shadow-sm">觀塘北</div>
    <div id="current-temp" class="text-[6rem] font-ultralight leading-none mt-1 ml-4 shadow-sm">--&deg;</div>
    <div id="current-desc" class="text-xl font-medium text-gray-200 mt-1 shadow-sm">--</div>
    <div class="text-lg font-medium text-gray-200 mt-1 flex space-x-3 shadow-sm">
      <span id="temp-high">最高 --&deg;</span>
      <span id="temp-low">最低 --&deg;</span>
    </div>
  </div>

  <div class="w-full max-w-md glass-card rounded-3xl mt-10 p-4">
    <div id="hourly-desc" class="text-sm font-medium text-gray-100 border-b border-white/20 pb-3 mb-3">
      正在取得每小時天氣預測...
    </div>
    
    <div id="hourly-forecast" class="flex space-x-6 overflow-x-auto no-scrollbar pb-2">
      </div>
  </div>

  <div class="w-full max-w-md glass-card rounded-3xl mt-6 p-5 mb-10 flex flex-col h-64">
    <div class="flex items-center justify-between border-b border-white/20 pb-3 mb-4">
      <div class="flex items-center space-x-2 text-sm font-semibold text-gray-300 uppercase tracking-wider">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z" /></svg>
        <span>即時港聞</span>
      </div>
      <div class="text-[10px] bg-red-500/80 text-white px-2 py-0.5 rounded-full font-bold animate-pulse">LIVE</div>
    </div>
    
    <div id="news-list" class="flex-1 overflow-y-auto no-scrollbar space-y-4">
      <div class="text-center text-gray-400 text-sm mt-4">正在同步最新新聞...</div>
    </div>
  </div>

  <script>
    // WMO 國際氣象代碼轉換 (轉換成廣東話/繁體中文及對應 Emoji)
    const wmoMap = {
      0: { text: '晴朗', icon: '☀️' },
      1: { text: '大致晴朗', icon: '🌤️' },
      2: { text: '部分時間有陽光', icon: '⛅' },
      3: { text: '多雲', icon: '☁️' },
      45: { text: '有霧', icon: '🌫️' },
      48: { text: '有霧', icon: '🌫️' },
      51: { text: '微細毛毛雨', icon: '🌧️' },
      53: { text: '毛毛雨', icon: '🌧️' },
      55: { text: '強毛毛雨', icon: '🌧️' },
      61: { text: '微雨', icon: '🌧️' },
      63: { text: '雨', icon: '🌧️' },
      65: { text: '大雨', icon: '🌧️' },
      71: { text: '微雪', icon: '❄️' },
      73: { text: '雪', icon: '❄️' },
      75: { text: '大雪', icon: '❄️' },
      95: { text: '雷暴', icon: '⛈️' },
      96: { text: '強雷暴', icon: '⛈️' },
      99: { text: '強雷暴', icon: '⛈️' }
    };

    function getWeatherInfo(code) {
      return wmoMap[code] || { text: '未知', icon: '☁️' };
    }

    async function fetchWeather() {
      try {
        // 使用 Open-Meteo 獲取當前、每小時及每日最高最低溫度 (完美匹配 iPhone 邏輯)
        const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=22.3132&longitude=114.2258&current=temperature_2m,weather_code,precipitation&hourly=temperature_2m,weather_code,precipitation_probability&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=Asia%2FHong_Kong');
        const data = await res.json();
        
        // 1. 更新頂部主天氣
        const currentTemp = Math.round(data.current.temperature_2m);
        const currentCode = data.current.weather_code;
        const info = getWeatherInfo(currentCode);
        
        document.getElementById('current-temp').innerHTML = `${currentTemp}&deg;`;
        document.getElementById('current-desc').innerText = info.text;
        document.getElementById('temp-high').innerHTML = `最高 ${Math.round(data.daily.temperature_2m_max[0])}&deg;`;
        document.getElementById('temp-low').innerHTML = `最低 ${Math.round(data.daily.temperature_2m_min[0])}&deg;`;

        // 更新提示文字
        const rainProb = data.hourly.precipitation_probability[new Date().getHours()];
        document.getElementById('hourly-desc').innerText = rainProb > 30 ? `預計未來幾小時有 ${rainProb}% 機會降雨。` : `目前天氣${info.text}。`;

        // 2. 更新橫向每小時預測
        const currentHourIndex = new Date().getHours();
        let hourlyHtml = '';
        
        // 顯示未來 6 小時的預測
        for(let i = 0; i <= 6; i++) {
          const index = currentHourIndex + i;
          const timeLabel = i === 0 ? '現時' : `${index % 24}時`;
          const temp = Math.round(data.hourly.temperature_2m[index]);
          const code = data.hourly.weather_code[index];
          const prob = data.hourly.precipitation_probability[index];
          const hourInfo = getWeatherInfo(code);
          
          hourlyHtml += `
            <div class="flex flex-col items-center space-y-2 min-w-[3rem]">
              <span class="text-sm font-medium ${i === 0 ? 'text-white' : 'text-gray-300'}">${timeLabel}</span>
              <span class="text-2xl">${hourInfo.icon}</span>
              ${prob > 20 ? `<span class="text-[10px] text-[#5ac8fa] font-bold">${prob}%</span>` : `<span class="text-[10px] text-transparent">0%</span>`}
              <span class="text-lg font-medium text-white">${temp}&deg;</span>
            </div>
          `;
        }
        document.getElementById('hourly-forecast').innerHTML = hourlyHtml;

      } catch (e) {
        document.getElementById('current-temp').innerText = "--";
      }
    }

    // 真正 100% 破除緩存的新聞獲取邏輯
    async function fetchHKNews() {
      try {
        // 加上 Date.now() 確保每次呼叫的 URL 都不同，徹底避開所有 Proxy 緩存
        const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent('https://rthk.hk/rthk/news/rss/c_expressnews_clocal.xml?_=' + Date.now())}`;
        
        const res = await fetch(proxyUrl, { cache: "no-store" });
        const xml = await res.text();
        
        const parser = new DOMParser();
        const doc = parser.parseFromString(xml, "text/xml");
        const items = doc.querySelectorAll("item");
        
        if (items.length > 0) {
          let newsHtml = '';
          
          // 抽取最新 4 條新聞
          for(let i = 0; i < Math.min(4, items.length); i++) {
            const title = items[i].querySelector("title").textContent;
            const pubDateStr = items[i].querySelector("pubDate").textContent;
            
            const pubTime = new Date(pubDateStr.replace(/-/g, '/')); // 兼容 iOS 日期格式
            let h = pubTime.getHours(), m = String(pubTime.getMinutes()).padStart(2, '0');
            const timeString = isNaN(h) ? "" : `${String(h).padStart(2, '0')}:${m}`;
            
            newsHtml += `
              <div class="flex flex-col">
                <div class="text-[15px] font-medium text-gray-100 leading-snug line-clamp-2">${title}</div>
                <div class="text-[11px] text-gray-400 mt-1">${timeString}</div>
              </div>
              ${i !== 3 ? '<div class="border-b border-white/10 my-2"></div>' : ''}
            `;
          }
          document.getElementById('news-list').innerHTML = newsHtml;
        }
      } catch (e) {
        document.getElementById('news-list').innerHTML = '<div class="text-sm text-red-400">連線失敗，請稍後再試。</div>';
      }
    }

    // 啟動與定時更新 (天氣每10分鐘，新聞每1分鐘)
    fetchWeather();
    fetchHKNews();
    setInterval(fetchWeather, 600000); 
    setInterval(fetchHKNews, 60000); 
  </script>
</body>
</html>
